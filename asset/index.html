  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <title>Reciept</title>
    <meta name="theme-color" content="#97281e">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #97281e;
            --secondary: #333333;
        }
        .clr-p {
            color: var(--primary)
        }
        html, body {
            font-family: Helvetica, Sans-Serif;
        }
        header {
            background-color: #97281e;
            height: 50px;
            color: #fff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }
        header i {            
            margin-right: 20px;
        }
        #logo {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 70px;
            padding: 10px;
            background-color: #fff;
        }
        #logo img {
            height: 50px;
            width: 100%;
            object-fit: contain;
        }
        #success {
            display: flex;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
        }
        #success p {
            margin-bottom: 0;
            margin-left: 10px;
            font-size: 20px;
        }
        #success p span {
            display: block;
            line-height: 1;
        }
        .fa-check {
            height: 35px;
            width: 35px;
            border-radius: 50%;
            border: 2px solid;
            color: #00b100;
            display: inline-flex;
            align-items: center;
            font-size: 20px;
            justify-content: center;
            line-height: 1px;
        }
        #table {
            padding: 0 25px;
        }
        table {
            width: 100%;
        }
        tr td {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }
        tr:last-child td {
            border-bottom: 0;
        }
        tr td:first-child {
            opacity: 80%;
        }
        tr td:last-child {
           padding-left: 15px;
        }
        #btn {
            background-color: var(--primary);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            width: 100%;
            display: block;
            text-align: center;
            font-weight: 500;
            margin-top: 15px;
        }
        footer {
            height: 10px;
            background-color: var(--primary);
            position: fixed;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 12px;
        }
    </style>
  </head>
