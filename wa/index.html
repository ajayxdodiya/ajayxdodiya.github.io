<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

    <title>WhatsApp</title>
    <style>
    * {
        margin: 0; 
        padding: 0 
    }
    body {
        height: 100vh;
        overflow: hidden;
        display: flex;
        align-items:center
    }
    #phone {
        height: 90vh;
        overflow: hidden;
        width: 100vw;
        display: flex;
        flex-direction: column;
    }
    #screen {
        height: 15%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 35px;
        letter-spacing: 5px;
        font-weight: 600;
        line-height: 1;
    }
    #numbers {
        height: 85%;
        display: flex;
        flex-wrap: wrap;
        border-left: 1px solid #ddd;
        border-bottom: 1px solid #ddd;
    }
    .xbtn {
        width: calc(100% / 3);
        flex: 0 0 calc(100% / 3);
        height: 25%;
        display: flex;
        align-items: center;
        justify-content: center;
        border-right: 1px solid #ddd;
        border-top: 1px solid #ddd;
        font-size: 35px;
        letter-spacing: 5px;
        font-weight: 600;
        line-height: 1;
    }
    .xbtn:active {
        background-color: #00d26a;
        color: #fff
    }
    </style>
  </head>
  <body>
    <div id="phone">
        <div id="screen">
            <span id="mob"></span>
        </div>
        <div id="numbers">
            <div class="xbtn" data-val="1">1</div>
            <div class="xbtn" data-val="2">2</div>
            <div class="xbtn" data-val="3">3</div>
            <div class="xbtn" data-val="4">4</div>
            <div class="xbtn" data-val="5">5</div>
            <div class="xbtn" data-val="6">6</div>
            <div class="xbtn" data-val="7">7</div>
            <div class="xbtn" data-val="8">8</div>
            <div class="xbtn" data-val="9">9</div>
            <div class="xbtn" data-val="-">❎</div>
            <div class="xbtn" data-val="0">0</div>
            <div class="xbtn" data-val="+">✅</div>            
        </div>
    </div>
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
    <script>
        $(function(){
            var btn = $('.xbtn');
            var mob = $('#mob');
            btn.click(function(){
                var val = $(this).data('val');
                var _mob = $('#mob').html();
                if (val === '+' && _mob.length === 10) {
                    window.location.href = "whatsapp://send/?phone=91" + _mob;
                }
                if (val === '-' && _mob.length > 0) {
                    _mob = _mob.substring(0, _mob.length-1);
                }
                if (_mob.length > 9) {
                    return false
                } else if (val !== '+' && val !== '-'){
                    _mob = mob.html() + val;
                }
                mob.html(_mob);
            })
        })
    </script>
  </body>
</html>
