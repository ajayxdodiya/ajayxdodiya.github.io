      <script>
        // fetch
        function fetch() {
           // https://docs.google.com/spreadsheets/d//edit?usp=sharing
           var url = "https://sheets.googleapis.com/v4/spreadsheets/164bt82II8PwEMgk_VTkk08u2Dnw3zWFJ7E47S_THYK4/values/Sheet1?key=AIzaSyAA8X39KWnJx88z_56KMuf4hhGJ00i69mo"
               $.ajax({
               dataType: "json",
               url: url,
               success: function(response){
                 // console.log(data.values)
                 globalData = response.values;
                 createJSON()
               }
            });
        }
         // 0 title
         // 1 season
         // 2 episode
         // 3 sequel
         // 4 link
         // 5 type
         // 6 year
         // 7 isSequel
         // 8 isSequelTitle
         // 9 epTitle
         // 10 seasonTitle
         var globalData;
         var globalDataJSON = [];
         var sortedData = [];
         var finalData = [
           { title: 'Movie', data : [] },
           { title: 'Webseries', data : [] },
         ];
           // create
           function createJSON() {
             values = globalData;
             let heading = values[0];
             values.shift();        
             values.forEach(function(value, index){              
                 let i = sortedData.findIndex((item) => item.heading==value[0]);              
                 if (i<0 && value[0]) {                
                   sortedData.push({
                       heading: value[0],
                       type: value[5],
                       isSequel: value[5] == 'Movie' ? value[7] : null,
                       data: [],
                       year: value[6]
                   })        
                 }
             })
             // console.log(globalData)
             sortedData.forEach(function(value1, index1){
               globalData.forEach(function(value2, index2){
                 if(value1.heading==value2[0]) {
                   if(value1.type=='Webseries') {    
                     delete value1.isSequel;             
                     value1.data.push({
                       season: value2[1],
                       episode: value2[2],
                       link: value2[4],
                       year: value2[6],
                       epTitle: value2[9],
                       seasonTitle: value2[10]
                     })
                   }
                   if(value1.type=='Movie') {     
                     if(value1.isSequel==1) {                        
                       value1.data.push({
                         sequel: value2[3],
                         sequelTitle: value2[8],
                         year: value2[6],
                         link: value2[4]
                       })
                     } else {
                       delete value1.data
                       value1.link= value2[4];
                     }
                   }
                 }
               })
             })
             sortedData.forEach(function(data, index){
               if(data.type=='Webseries') {
                   var _twp = data.data;
                   delete sortedData[index].data;  
                   sortedData[index].season = [];             
                   var n=100;
                   for (let i = 0; i < n; i++) { 
                     sortedData[index].season.push({
                       season: ''+(i+1),
                       data: []
                     });
                   }
                   _twp.forEach(function(data2, index2){
                     for (let i = 0; i < n; i++) {                    
                       if(data2.season == ''+i) {
                         sortedData[index].season[i-1].data.push(data2)
                       }
                     }
                   })
               }
             })
             sortedData.forEach(function(data, index){
               if(data.type=='Webseries') {
                 var _allseasons = data.season;
                 _allseasons.forEach(function(data4,index4){
                   if(data4.data.length === 0) {
                     delete _allseasons[index4]                  
                   }
                 })
               }
             })
             // console.log(sortedData)
             sortedData.forEach(function(data, index){
               if(data.type=='Webseries') {
                 finalData[1].data.push(data)
               }
               if(data.type=='Movie') {
                 finalData[0].data.push(data)
               }
             })
             console.log(finalData)    
             finalData[0].data.reverse();
             finalData[1].data.reverse();
             finalData[0].data.forEach(function(data, index){
                var html = ``;
                html += `
                      <div class="accordion-item">
                        <h2 class="accordion-header" id="headingOne`+index+`">
                          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOnePane`+index+`" aria-expanded="false" aria-controls="collapseOnePane`+index+`">
                          `+data.heading+` `+ (data.isSequel == '0' ? ' - ' + data.year : '') +`
                          </button>
                        </h2>
                        <div id="collapseOnePane`+index+`" class="accordion-collapse collapse" aria-labelledby="headingOne`+index+`" data-bs-parent="#accordionExamplePane1">
                          <div class="accordion-body">`;
                            if (data.isSequel == '0') {
                            html += `<p><a class="btn btn-success col-12" href="`+data.link+`"><i class="fa fa-download"></i>  `+data.heading+`</a></p>`
                          }  
                          if (data.isSequel == '1') {
                            data.data.forEach(function(data2, index2){
                              html += `<p><a class="btn btn-success col-12" href="`+data2.link+`"><i class="fa fa-download"></i>   `+data2.sequelTitle+` - `+data2.year+`</a></p>`
                            })
                          }                              
                html += `</div>
                        </div>
                      </div>
                `;
                $(document).find('#accordionExamplePane1').append(html)
             })      
             finalData[1].data.forEach(function(data, index){
                var html = ``;
                html += `
                      <div class="accordion-item">
                        <h2 class="accordion-header" id="headingOneWB`+index+`">
                          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOnePaneWB`+index+`" aria-expanded="false" aria-controls="collapseOnePaneWB`+index+`">
                          `+data.heading+` `+ (data.isSequel == '0' ? ' - ' + data.year : '') +`
                          </button>
                        </h2>
                        <div id="collapseOnePaneWB`+index+`" class="accordion-collapse collapse" aria-labelledby="headingOneWB`+index+`" data-bs-parent="#accordionExamplePane2">
                          <div class="accordion-body">`;
                          
                          
                            data.season.forEach(function(data2, index2){
                              html += `<p class="text-center">Season `+data2.season+` - `+data2.data[0].year+` - `+data2.data[0].seasonTitle+`</p>`;
                              data2.data.forEach(function(data3, index3){
                                html += `<p><a class="btn btn-success col-12" href="`+data3.link+`"><i class="fa fa-download"></i>  S`+data2.season+`: Episode `+data3.episode+` `+(data3.epTitle ? '-' + data3.epTitle : '')+` </a></p>`
                              })
                            })
                                                    
                html += `</div>
                        </div>
                      </div>
                `;
                $(document).find('#accordionExamplePane2').append(html)
             })                 
           }
              
           
           // fetch
           $(document).ready(function(){            
              fetch();
           })
      </script>
